name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          manifest_version=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          if [ "$manifest_version" != "$TAG_VERSION" ]; then
            echo "Error: manifest.json version ($manifest_version) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build zip
        run: make build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/rwgps-streetview-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
